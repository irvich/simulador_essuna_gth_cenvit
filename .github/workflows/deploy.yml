name: Deploy a GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Compilar simulador de examen (raíz)
        run: |
          npm install
          npm run build

      - name: Compilar app real de clima laboral (App.tsx + Supabase)
        env:
          GITHUB_PAGES: "1"
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_ADMIN_PASSWORD: ${{ secrets.VITE_ADMIN_PASSWORD }}
        run: |
          cd clima-laboral
          npm install
          npm run build:app

      - name: Compilar demo (panel consultor, datos simulados)
        env:
          GITHUB_PAGES: "1"
        run: |
          cd clima-laboral
          npx vite build --base=/simulador_essuna_gth_cenvit/clima-laboral/demo/

      - name: Unir carpetas dist
        run: |
          # App real → /clima-laboral/  (principal)
          mkdir -p dist/clima-laboral
          cp -r clima-laboral/dist-app/. dist/clima-laboral/
          mv dist/clima-laboral/app.html dist/clima-laboral/index.html
          # Demo → /clima-laboral/demo/
          mkdir -p dist/clima-laboral/demo
          cp -r clima-laboral/dist/. dist/clima-laboral/demo/

      - name: Subir carpeta dist combinada
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Publicar en GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
